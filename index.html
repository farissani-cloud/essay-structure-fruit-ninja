<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baton Essay Slice - Bombs & Blades</title>
    <style>
        :root {
            --ocean-blue: #0077be;
            --sand-yellow: #f4d03f;
            --palm-green: #2ecc71;
            --sunset-orange: #e67e22;
            --hibiscus-pink: #ff1493;
            --volcano-red: #c0392b;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #fdfaf0;
            font-family: 'Verdana', sans-serif;
            touch-action: none;
            user-select: none;
        }

        canvas { 
            display: block; 
            cursor: none; 
            z-index: 5;
        }

        #ui-layer {
            position: absolute;
            top: 10px; left: 10px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--sand-yellow);
            pointer-events: none;
            z-index: 100;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 300;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: #fffaf0;
            padding: 25px;
            border-radius: 20px;
            border: 6px solid var(--sand-yellow);
            max-width: 85%;
            text-align: center;
        }

        .option-btn {
            display: block; width: 100%;
            padding: 14px; margin: 10px 0;
            background: #fff;
            border: 2px solid var(--ocean-blue);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
        }

        .btn-action {
            padding: 15px 30px;
            background: var(--sunset-orange);
            color: white;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <b>B1-B2 Expert</b><br>
    Score: <span id="score">0</span> | Lives: <span id="lives">3</span><br>
    Avoid the 🌋 Bombs!
</div>

<canvas id="gameCanvas"></canvas>

<div id="start-screen" class="modal" style="display: flex;">
    <div class="modal-content">
        <h1 style="color: var(--ocean-blue)">Baton & Bombs</h1>
        <p><b>Swipe</b> through fruits to answer.<br><b>Avoid</b> the Volcanic Bombs 🌋 or it's Game Over!</p>
        <button class="btn-action" onclick="startGame()">START MISSION</button>
    </div>
</div>

<div id="question-modal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--palm-green)">Structure Check</h2>
        <p id="question-text" style="font-weight: bold;"></p>
        <div id="options-container"></div>
        <div id="answer-feedback" style="font-weight: bold; margin: 10px; min-height: 20px;"></div>
        <button id="continue-btn" class="btn-action" style="display:none;">CONTINUE</button>
    </div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const bgMusic = document.getElementById('bg-music');

let gameActive = false;
let score = 0;
let lives = 3;
let difficulty = 1.0;
let objects = [];
let trail = [];
let lastTime = 0;
let availableQuestions = [];

const questions = [
    { q: "Which transition shows a 'Cause and Effect'?", options: ["For example", "Because of this", "On the other hand", "Firstly"], answer: 1 },
    { q: "A 'Topic Sentence' is used to:", options: ["End the essay", "Introduce the paragraph's main idea", "Check spelling", "List references"], answer: 1 },
    { q: "Which word adds information?", options: ["Alternatively", "Additionally", "Instead", "Unless"], answer: 1 },
    { q: "The 'Thesis Statement' belongs in the:", options: ["Conclusion", "Body Paragraph", "Introduction", "Page Header"], answer: 2 },
    { q: "Formal writing should avoid:", options: ["Facts", "Contractions (e.g., don't)", "Transitions", "Third person"], answer: 1 }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class GameObject {
    constructor(isBomb) {
        this.radius = 45;
        this.x = Math.random() * (canvas.width - 100) + 50;
        this.y = canvas.height + 50;
        this.isBomb = isBomb;
        this.gravity = 600 * difficulty;
        this.vy = -Math.sqrt(2 * (canvas.height * 0.8) * this.gravity);
        this.vx = (Math.random() - 0.5) * 200;
        this.label = isBomb ? '🌋' : ['🍍', '🥭', '🥥', '🍌', '🍉'][Math.floor(Math.random()*5)];
    }

    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += this.gravity * dt;
    }

    draw() {
        ctx.font = "60px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.label, this.x, this.y);
    }
}

function checkCollision(obj) {
    if (trail.length < 2) return false;
    
    // Check line segment intersection with circle
    const p1 = trail[trail.length - 2];
    const p2 = trail[trail.length - 1];
    
    // Calculate distance between points to ensure it's a swipe, not a tap
    const swipeDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
    if (swipeDist < 5) return false; // Too slow/short to be a slice

    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const t = ((obj.x - p1.x) * dx + (obj.y - p1.y) * dy) / (dx * dx + dy * dy);
    const closestX = p1.x + Math.max(0, Math.min(1, t)) * dx;
    const closestY = p1.y + Math.max(0, Math.min(1, t)) * dy;
    
    return Math.hypot(obj.x - closestX, obj.y - closestY) < obj.radius;
}

function gameLoop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameActive) {
        if (Math.random() < 0.02) {
            const isBomb = Math.random() < 0.15; // 15% chance for a bomb
            objects.push(new GameObject(isBomb));
        }

        for (let i = objects.length - 1; i >= 0; i--) {
            let obj = objects[i];
            obj.update(dt);
            obj.draw();

            if (checkCollision(obj)) {
                if (obj.isBomb) {
                    endGame("BOOM! You sliced a Volcanic Bomb!");
                    return;
                } else {
                    objects.splice(i, 1);
                    gameActive = false;
                    triggerQuestion();
                }
            }

            if (obj.y > canvas.height + 100) {
                if (!obj.isBomb) lives--;
                objects.splice(i, 1);
                updateUI();
                if (lives <= 0) endGame("Out of lives! The library is lost.");
            }
        }
    }

    drawBaton();
    
    // Trail decay
    if (trail.length > 0) trail.shift();

    requestAnimationFrame(gameLoop);
}

function drawBaton() {
    if (trail.length < 2) return;
    
    ctx.beginPath();
    for (let i = 0; i < trail.length - 1; i++) {
        const p1 = trail[i];
        const p2 = trail[i+1];
        const pct = i / trail.length;
        
        ctx.lineWidth = pct * 18;
        ctx.strokeStyle = `rgba(255, 20, 147, ${pct})`;
        ctx.lineCap = "round";
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
}

function triggerQuestion() {
    const modal = document.getElementById('question-modal');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('answer-feedback');
    
    const q = questions[Math.floor(Math.random() * questions.length)];

    document.getElementById('question-text').innerText = q.q;
    container.innerHTML = "";
    feedback.innerText = "";
    document.getElementById('continue-btn').style.display = "none";
    
    q.options.forEach((opt, idx) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = opt;
        b.onclick = () => {
            if (idx === q.answer) {
                score += 10;
                difficulty += 0.05;
                updateUI();
                feedback.innerText = "Correct! Progressing... 🌴";
                feedback.style.color = "var(--palm-green)";
                document.getElementById('continue-btn').style.display = "block";
            } else {
                feedback.innerText = "Incorrect! ❌";
                feedback.style.color = "var(--volcano-red)";
            }
        };
        container.appendChild(b);
    });
    modal.style.display = "flex";
}

document.getElementById('continue-btn').onclick = () => {
    document.getElementById('question-modal').style.display = "none";
    trail = []; // Clear trail so we don't instant-slice the next fruit
    gameActive = true;
};

function startGame() {
    bgMusic.play();
    score = 0; lives = 3; difficulty = 1.0;
    objects = [];
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    updateUI();
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('lives').innerText = lives;
}

function endGame(msg) {
    gameActive = false;
    alert(msg);
    location.reload();
}

function handleMove(e) {
    const x = e.clientX || (e.touches && e.touches[0].clientX);
    const y = e.clientY || (e.touches && e.touches[0].clientY);
    if (x && y) {
        trail.push({ x, y });
        if (trail.length > 15) trail.shift();
    }
}

window.addEventListener('mousemove', handleMove);
window.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, { passive: false });

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
