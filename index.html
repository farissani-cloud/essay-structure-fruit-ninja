<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tropical Essay Slice - Baton Edition</title>
    <style>
        :root {
            --ocean-blue: #0077be;
            --sand-yellow: #f4d03f;
            --palm-green: #2ecc71;
            --sunset-orange: #e67e22;
            --hibiscus-pink: #ff69b4;
            --text-dark: #2c3e50;
            --bg-light: #fdfaf0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
            font-family: 'Verdana', sans-serif;
            color: var(--text-dark);
            overscroll-behavior: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #fdfaf0 100%);
        }

        canvas { display: block; cursor: none; } /* Hide standard cursor for baton */

        #ui-layer {
            position: absolute;
            top: 10px; left: 10px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--sand-yellow);
            pointer-events: none;
            z-index: 10;
        }

        #audio-controls {
            position: absolute;
            top: 10px; right: 10px;
            z-index: 20;
        }

        .audio-btn {
            background: var(--palm-green);
            border: none; border-radius: 50%;
            width: 44px; height: 44px;
            cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 0 #27ae60;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 300;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: #fffaf0;
            padding: 25px;
            border-radius: 20px;
            border: 6px solid var(--sand-yellow);
            max-width: 85%;
            text-align: center;
        }

        .option-btn {
            display: block; width: 100%;
            padding: 14px; margin: 10px 0;
            background: #fff;
            border: 2px solid var(--ocean-blue);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
        }

        .btn-action {
            padding: 15px 30px;
            background: var(--sunset-orange);
            color: white;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <b>B1-B2 Progression</b><br>
        Score: <span id="score">0</span> | Lives: <span id="lives">3</span><br>
        Remaining: <span id="q-remaining">25</span><br>
        Intensity: <span id="speed-level">100%</span>
    </div>

    <div id="audio-controls">
        <button class="audio-btn" id="mute-toggle">🔊</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="modal" style="display: flex;">
        <div class="modal-content">
            <h1 style="color: var(--ocean-blue)">Baton Essay Slice</h1>
            <p>Use the slicing baton to recover fragments!<br>Speed starts at 100% and increases.</p>
            <button class="btn-action" onclick="startGame()">START ADVENTURE</button>
        </div>
    </div>

    <div id="question-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--palm-green)">Structure Fragment</h2>
            <p id="question-text" style="font-weight: bold;"></p>
            <div id="options-container"></div>
            <div id="answer-feedback" style="font-weight: bold; margin: 10px; min-height: 20px;"></div>
            <button id="continue-btn" class="btn-action" style="display:none;">CONTINUE</button>
        </div>
    </div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bgMusic = document.getElementById('bg-music');
let isMuted = false;

function playSwoosh() {
    if (isMuted) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

const masterQuestions = [
    { q: "Which word is best to start a paragraph with a NEW idea?", options: ["Furthermore", "However", "In addition", "Overall"], answer: 2 },
    { q: "What is the main goal of the 'Introduction'?", options: ["To give every detail", "To state the thesis and background", "To list the bibliography", "To say goodbye"], answer: 1 },
    { q: "Which transition shows a 'Cause and Effect'?", options: ["For example", "Because of this", "On the other hand", "Firstly"], answer: 1 },
    { q: "In an essay, what does 'To conclude' mean?", options: ["To start the essay", "To give more evidence", "To summarize the main points", "To ask a new question"], answer: 2 },
    { q: "Which phrase is more formal than 'I think'?", options: ["It is often argued that", "In my brain", "I believe", "I'm saying"], answer: 0 },
    { q: "What is a 'Topic Sentence'?", options: ["The last sentence", "The sentence that gives the main idea of a paragraph", "A sentence about the weather", "The title of the book"], answer: 1 },
    { q: "Which word shows a 'Contrast'?", options: ["Moreover", "Similarly", "However", "Consequently"], answer: 2 },
    { q: "A good essay should be divided into:", options: ["One long text", "Paragraphs", "Short bullet points", "Numbered lists only"], answer: 1 },
    { q: "Which word adds information?", options: ["Alternatively", "Additionally", "Instead", "Unless"], answer: 1 },
    { q: "The 'Thesis Statement' is usually found in the:", options: ["Conclusion", "Body Paragraph", "Introduction", "Reference List"], answer: 2 },
    { q: "What should you do after giving a quote?", options: ["Nothing", "Explain how it supports your point", "Give another quote immediately", "Change the topic"], answer: 1 },
    { q: "Which transition is used for 'Examples'?", options: ["In contrast", "For instance", "Therefore", "Lastly"], answer: 1 },
    { q: "What is the purpose of 'Supporting Sentences'?", options: ["To repeat the title", "To give evidence and details", "To end the essay", "To check spelling"], answer: 1 },
    { q: "Which is a formal way to say 'But'?", options: ["And", "So", "Nevertheless", "Like"], answer: 2 },
    { q: "A 'Balanced Argument' essay includes:", options: ["Only your opinion", "Both sides of an issue", "Only facts about history", "A list of definitions"], answer: 1 },
    { q: "Which word signals the end of a sequence?", options: ["Firstly", "Secondly", "Finally", "Next"], answer: 2 },
    { q: "What does 'Relevant' mean in essay writing?", options: ["Interesting but off-topic", "Directly connected to the question", "Very long", "Difficult to read"], answer: 1 },
    { q: "Which phrase introduces a result?", options: ["As a result", "In contrast", "Similarly", "In my view"], answer: 0 },
    { q: "Formal writing should avoid using:", options: ["Long words", "Contractions (like 'don't')", "Facts", "Transitions"], answer: 1 },
    { q: "A 'Link Sentence' is used to:", options: ["Start the essay", "Connect two paragraphs", "Give a definition", "Close the browser"], answer: 1 },
    { q: "What should you avoid in a Conclusion?", options: ["Summarizing", "Adding new information", "Restating the thesis", "A final thought"], answer: 1 },
    { q: "Which word is a synonym for 'Therefore'?", options: ["Consequently", "But", "Also", "Although"], answer: 0 },
    { q: "Academic writing usually uses the:", options: ["First person (I/me)", "Third person (It/They)", "Second person (You)", "Slang person"], answer: 1 },
    { q: "To 'Paraphrase' means to:", options: ["Copy exactly", "Write in your own words", "Delete a sentence", "Highlight a word"], answer: 1 },
    { q: "Which is a 'Hook'?", options: ["The final sentence", "A way to grab the reader's attention", "A list of sources", "The page number"], answer: 1 }
];

let availableQuestions = [];
let score = 0, lives = 3, gameActive = false;
let fruits = [];
let lastTime = 0;
let difficultyMultiplier = 1.0;

// --- BATON CURSOR STATE ---
let trail = [];
const MAX_TRAIL = 8; 
let mousePos = { x: 0, y: 0, down: false };

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Fruit {
    constructor() {
        this.radius = Math.min(canvas.width * 0.08, 55);
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = canvas.height + this.radius;
        this.gravity = canvas.height * 0.55 * difficultyMultiplier; 
        let verticalForce = Math.sqrt(2 * (canvas.height * 0.75) * this.gravity); 
        this.vy = -verticalForce; 
        this.vx = (Math.random() - 0.5) * (canvas.width * 0.3) * difficultyMultiplier;
        this.label = ['🍍', '🥭', '🥥', '🍌', '🍉'][Math.floor(Math.random()*5)];
        this.sliced = false;
    }
    update(dt) {
        this.x += this.vx * dt; this.y += this.vy * dt; this.vy += this.gravity * dt;
        if(this.x < this.radius || this.x > canvas.width - this.radius) this.vx *= -1;
    }
    draw() {
        ctx.font = `${this.radius * 1.5}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(this.label, this.x, this.y);
    }
}

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    bgMusic.play();
    score = 0; lives = 3; difficultyMultiplier = 1.0;
    availableQuestions = JSON.parse(JSON.stringify(masterQuestions));
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    lastTime = performance.now();
    updateUI();
    requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
    if (!gameActive) {
        drawBaton(); // Keep cursor alive even if paused
        return;
    }
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    let spawnRate = 0.015 * difficultyMultiplier;
    if (Math.random() < Math.min(spawnRate, 0.04)) fruits.push(new Fruit());

    for (let i = fruits.length - 1; i >= 0; i--) {
        let f = fruits[i]; f.update(dt); f.draw();
        
        // Slicing logic using trail distance
        if (mousePos.down && trail.length > 1) {
            let dist = Math.hypot(f.x - mousePos.x, f.y - mousePos.y);
            if (dist < f.radius * 1.5) {
                f.sliced = true; 
                playSwoosh();
                fruits.splice(i, 1); 
                gameActive = false; 
                triggerQuestion();
            }
        }

        if (f.y > canvas.height + 100) {
            fruits.splice(i, 1); lives--; updateUI();
            if (lives <= 0) endGame("The Essay Storm was too strong! Try again.");
        }
    }

    drawBaton();
    requestAnimationFrame(gameLoop);
}

function drawBaton() {
    // Add current pos to trail
    trail.push({ x: mousePos.x, y: mousePos.y });
    if (trail.length > MAX_TRAIL) trail.shift();

    if (trail.length < 2) return;

    // Slicing trail design
    ctx.beginPath();
    ctx.lineJoin = "round";
    ctx.lineCap = "round";

    for (let i = 0; i < trail.length - 1; i++) {
        let p1 = trail[i];
        let p2 = trail[i+1];
        
        // Tapered thickness: end of trail is thin, tip is thick
        ctx.lineWidth = (i / trail.length) * 12; 
        ctx.strokeStyle = `rgba(255, 105, 180, ${i / trail.length})`; // Pink hibiscus fade
        
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }

    // Glowing tip
    ctx.beginPath();
    ctx.arc(mousePos.x, mousePos.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
}

function triggerQuestion() {
    const modal = document.getElementById('question-modal');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('answer-feedback');
    
    const qIndex = Math.floor(Math.random() * availableQuestions.length);
    const q = availableQuestions.splice(qIndex, 1)[0]; 

    document.getElementById('question-text').innerText = q.q;
    container.innerHTML = ""; feedback.innerText = "";
    document.getElementById('continue-btn').style.display = "none";
    
    q.options.forEach((opt, idx) => {
        const b = document.createElement('button');
        b.className = 'option-btn'; b.innerText = opt;
        b.onclick = () => {
            if (idx === q.answer) {
                score += 10; 
                difficultyMultiplier += 0.05;
                updateUI(); 
                feedback.innerText = "Correct! The wind picks up... 📈";
                feedback.style.color = "var(--palm-green)";
                document.getElementById('continue-btn').style.display = "block";
                Array.from(container.children).forEach(btn => btn.disabled = true);
            } else {
                feedback.innerText = "Try again! ❌";
                feedback.style.color = "var(--sunset-orange)";
            }
        };
        container.appendChild(b);
    });
    modal.style.display = "flex";
}

document.getElementById('continue-btn').onclick = () => {
    document.getElementById('question-modal').style.display = "none";
    gameActive = true; 
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
};

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('lives').innerText = lives;
    document.getElementById('q-remaining').innerText = availableQuestions.length;
    document.getElementById('speed-level').innerText = Math.round(difficultyMultiplier * 100) + "%";
}

function endGame(msg) { gameActive = false; alert(msg + "\nFinal Score: " + score); location.reload(); }

document.getElementById('mute-toggle').onclick = () => {
    isMuted = !isMuted; bgMusic.muted = isMuted;
    document.getElementById('mute-toggle').innerText = isMuted ? "🌑" : "🔊";
};

// Input handling for both mouse and touch
function updatePos(x, y, isDown) {
    mousePos.x = x; mousePos.y = y; mousePos.down = isDown;
}
window.addEventListener('mousemove', (e) => updatePos(e.clientX, e.clientY, true)); // Always "down" for visuals
window.addEventListener('mousedown', () => mousePos.down = true);
window.addEventListener('mouseup', () => mousePos.down = false);

window.addEventListener('touchstart', (e) => {
    updatePos(e.touches[0].clientX, e.touches[0].clientY, true);
    e.preventDefault();
}, {passive: false});
window.addEventListener('touchmove', (e) => {
    updatePos(e.touches[0].clientX, e.touches[0].clientY, true);
    e.preventDefault();
}, {passive: false});
window.addEventListener('touchend', () => mousePos.down = false);

</script>
</body>
</html>
