<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tropical Essay Slice - Final Fix</title>
    <style>
        :root {
            --ocean-blue: #0077be;
            --sand-yellow: #f4d03f;
            --palm-green: #2ecc71;
            --sunset-orange: #e67e22;
            --hibiscus-pink: #ff69b4;
            --text-dark: #2c3e50;
            --bg-light: #fdfaf0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
            font-family: 'Georgia', serif;
            color: var(--text-dark);
            overscroll-behavior: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #fdfaf0 100%);
        }

        canvas { display: block; }

        #ui-layer {
            position: absolute;
            top: 10px; left: 10px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--sand-yellow);
            pointer-events: none;
            z-index: 10;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 300;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: #fffaf0;
            padding: 25px;
            border-radius: 20px;
            border: 6px solid var(--sand-yellow);
            max-width: 85%;
            text-align: center;
        }

        .option-btn {
            display: block; width: 100%;
            padding: 14px; margin: 10px 0;
            background: #fff;
            border: 2px solid var(--ocean-blue);
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-action {
            padding: 15px 30px;
            background: var(--sunset-orange);
            color: white;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <b>Level: <span id="level-num">1</span></b><br>
        Score: <span id="score">0</span> | Lives: <span id="lives">3</span><br>
        Remaining: <span id="q-remaining">25</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="modal" style="display: flex;">
        <div class="modal-content">
            <h1 style="color: var(--ocean-blue)">Tropical Essay Slice</h1>
            <p>Answer all 25 questions to win. Fruits fly higher as you progress!</p>
            <button class="btn-action" onclick="startGame()">START</button>
        </div>
    </div>

    <div id="question-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--palm-green)">Essay Fragment!</h2>
            <p id="question-text"></p>
            <div id="options-container"></div>
            <div id="answer-feedback" style="font-weight: bold; margin: 10px;"></div>
            <button id="continue-btn" class="btn-action" style="display:none;">CONTINUE</button>
        </div>
    </div>
</div>

<script>
// --- QUESTION DATABASE ---
const masterQuestions = [
    { q: "What is the primary function of a thesis statement?", options: ["To greet the reader", "To state the central argument", "To list sources", "To define words"], answer: 1 },
    { q: "Which word introduces a contrast?", options: ["Moreover", "Conversely", "Furthermore", "Additionally"], answer: 1 },
    { q: "The 'hook' appears in the...", options: ["Conclusion", "Intro start", "Body", "Bibliography"], answer: 1 },
    { q: "Which transition signals a result?", options: ["However", "Consequently", "For example", "In addition"], answer: 1 },
    { q: "A topic sentence must...", options: ["Be a quote", "Summarize the paragraph idea", "Be long", "End with a comma"], answer: 1 },
    { q: "Formal tone avoids...", options: ["Logic", "Evidence", "Slang", "Structure"], answer: 2 },
    { q: "PEEL stands for Point, Evidence, Explanation, and...", options: ["List", "Link", "Logic", "Length"], answer: 1 },
    { q: "Formal essays use...", options: ["First person", "Second person", "Third person", "Emoji"], answer: 2 },
    { q: "A counter-argument...", options: ["Agrees with you", "Challenges your thesis", "Is a typo", "Ends the intro"], answer: 1 },
    { q: "Conclusions should NOT...", options: ["Restate thesis", "Summarize", "Add new info", "Be brief"], answer: 2 },
    { q: "Paraphrasing means...", options: ["Copy-paste", "Own words", "New font", "Deleting intro"], answer: 1 },
    { q: "Therefore is a synonym for...", options: ["But", "Thus", "Also", "First"], answer: 1 },
    { q: "Cohesion refers to...", options: ["Spelling", "Flow between ideas", "Margins", "Font"], answer: 1 },
    { q: "Thesis statement usually goes...", options: ["Start of essay", "End of intro", "References", "Title"], answer: 1 },
    { q: "Plagiarism is...", options: ["Writing long", "Using work without credit", "Using quotes", "Good research"], answer: 1 },
    { q: "Link sentences connect to...", options: ["Teacher", "Thesis", "Next essay", "Cover"], answer: 1 },
    { q: "Nevertheless means...", options: ["However", "Because", "Moreover", "Firstly"], answer: 0 },
    { q: "Critical thinking is...", options: ["Reading", "Analyzing", "Writing fast", "Copying"], answer: 1 },
    { q: "Bibliography is at the...", options: ["Start", "Middle", "End", "Top"], answer: 2 },
    { q: "An outline is a...", options: ["Drawing", "Plan", "Final draft", "Word count"], answer: 1 },
    { q: "Word for 'example'...", options: ["Similarly", "For instance", "Overall", "Instead"], answer: 1 },
    { q: "More formal choice:", options: ["It's", "It is", "Its", "Whatever"], answer: 1 },
    { q: "The 'Hook' grabs...", options: ["The Pen", "Attention", "Fruit", "Data"], answer: 1 },
    { q: "Where is Evidence in PEEL?", options: ["Start", "Middle", "End", "Title"], answer: 1 },
    { q: "Synthesis means...", options: ["Copying", "Combining ideas", "Ignoring", "Shortening"], answer: 1 }
];

let availableQuestions = [];
let score = 0, lives = 3, gameActive = false, currentLevel = 1;
let fruits = [];
let lastTime = 0;
let mousePos = { x: 0, y: 0, prevX: 0, prevY: 0, down: false };

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Fruit {
    constructor() {
        this.radius = Math.min(canvas.width * 0.08, 55);
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = canvas.height + this.radius;
        
        // --- FIXED FLYING PHYSICS ---
        // We use the canvas height to ensure they reach the top regardless of screen size
        let verticalForce = Math.sqrt(2 * (canvas.height * 0.85) * (canvas.height * 0.8)); 
        this.vy = -verticalForce; 
        this.vx = (Math.random() - 0.5) * (canvas.width * 0.4);
        this.gravity = canvas.height * 0.75; 
        
        this.label = ['🍍', '🥭', '🥥', '🍌', '🍉'][Math.floor(Math.random()*5)];
        this.sliced = false;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += this.gravity * dt;
        if(this.x < this.radius || this.x > canvas.width - this.radius) this.vx *= -1;
    }
    draw() {
        ctx.font = `${this.radius * 1.5}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.label, this.x, this.y);
    }
}

function startGame() {
    score = 0; lives = 3; currentLevel = 1;
    availableQuestions = JSON.parse(JSON.stringify(masterQuestions)); // Deep copy
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    lastTime = performance.now();
    updateUI();
    requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
    if (!gameActive) return;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Spawn rate
    if (Math.random() < 0.02) fruits.push(new Fruit());

    for (let i = fruits.length - 1; i >= 0; i--) {
        let f = fruits[i];
        f.update(dt); f.draw();

        if (mousePos.down && !f.sliced) {
            if (Math.hypot(f.x - mousePos.x, f.y - mousePos.y) < f.radius * 1.5) {
                f.sliced = true;
                fruits.splice(i, 1);
                gameActive = false;
                triggerQuestion();
            }
        }
        if (f.y > canvas.height + 100) {
            fruits.splice(i, 1);
            lives--;
            updateUI();
            if (lives <= 0) endGame("The essays were lost to the sea!");
        }
    }
    drawSlice();
    requestAnimationFrame(gameLoop);
}

function triggerQuestion() {
    if (availableQuestions.length === 0) {
        endGame("Victory! All fragments collected!");
        return;
    }

    const modal = document.getElementById('question-modal');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('answer-feedback');
    
    // CRITICAL: Pull and remove question
    const qIndex = Math.floor(Math.random() * availableQuestions.length);
    const q = availableQuestions[qIndex];
    
    document.getElementById('question-text').innerText = q.q;
    container.innerHTML = "";
    feedback.innerText = "";
    document.getElementById('continue-btn').style.display = "none";

    q.options.forEach((opt, idx) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = opt;
        b.onclick = () => {
            if (idx === q.answer) {
                score += 10;
                availableQuestions.splice(qIndex, 1); // REMOVE FROM POOL
                updateUI();
                feedback.innerText = "Correct! 🌴";
                document.getElementById('continue-btn').style.display = "block";
                Array.from(container.children).forEach(btn => btn.disabled = true);
            } else {
                feedback.innerText = "Try again!";
            }
        };
        container.appendChild(b);
    });
    modal.style.display = "flex";
}

document.getElementById('continue-btn').onclick = () => {
    document.getElementById('question-modal').style.display = "none";
    gameActive = true;
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
};

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('lives').innerText = lives;
    document.getElementById('q-remaining').innerText = availableQuestions.length;
    currentLevel = Math.floor((25 - availableQuestions.length) / 5) + 1;
    document.getElementById('level-num').innerText = currentLevel;
}

function endGame(msg) {
    gameActive = false;
    alert(msg + "\nScore: " + score);
    location.reload();
}

// Input logic
function handleIn(x, y, down) {
    mousePos.prevX = mousePos.x; mousePos.prevY = mousePos.y;
    mousePos.x = x; mousePos.y = y; mousePos.down = down;
}
canvas.addEventListener('mousedown', (e) => handleIn(e.clientX, e.clientY, true));
canvas.addEventListener('mousemove', (e) => handleIn(e.clientX, e.clientY, mousePos.down));
window.addEventListener('mouseup', () => mousePos.down = false);
canvas.addEventListener('touchstart', (e) => handleIn(e.touches[0].clientX, e.touches[0].clientY, true), {passive:false});
canvas.addEventListener('touchmove', (e) => { handleIn(e.touches[0].clientX, e.touches[0].clientY, true); e.preventDefault(); }, {passive:false});
window.addEventListener('touchend', () => mousePos.down = false);

function drawSlice() {
    if (mousePos.down) {
        ctx.beginPath();
        ctx.moveTo(mousePos.prevX, mousePos.prevY);
        ctx.lineTo(mousePos.x, mousePos.y);
        ctx.strokeStyle = "var(--hibiscus-pink)";
        ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.stroke();
    }
}
</script>
</body>
</html>
