<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tropical Essay Slice - Chill Edition</title>
    <style>
        :root {
            --ocean-blue: #0077be;
            --sand-yellow: #f4d03f;
            --palm-green: #2ecc71;
            --sunset-orange: #e67e22;
            --hibiscus-pink: #ff69b4;
            --text-dark: #2c3e50;
            --bg-light: #fdfaf0;
            --danger-red: #e74c3c;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
            font-family: 'Verdana', sans-serif;
            color: var(--text-dark);
            overscroll-behavior: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #fdfaf0 100%);
            transition: background 0.2s;
        }

        canvas { display: block; }

        #ui-layer {
            position: absolute;
            top: 10px; left: 10px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--sand-yellow);
            pointer-events: none;
            z-index: 10;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 300;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center; align-items: center;
        }

        .modal-content {
            background-color: #fffaf0;
            padding: 25px;
            border-radius: 20px;
            border: 6px solid var(--sand-yellow);
            max-width: 85%;
            text-align: center;
        }

        .option-btn {
            display: block; width: 100%;
            padding: 14px; margin: 10px 0;
            background: #fff;
            border: 2px solid var(--ocean-blue);
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-action {
            padding: 15px 30px;
            background: var(--sunset-orange);
            color: white;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* Explosion Flash Effect */
        .flash-red { background: var(--danger-red) !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <b>Relaxed Mode</b><br>
        Score: <span id="score">0</span> | Lives: <span id="lives">3</span><br>
        <small style="color: var(--danger-red)">⚠️ Avoid the Bombs!</small>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="modal" style="display: flex;">
        <div class="modal-content">
            <h1 style="color: var(--ocean-blue)">Tropical Slice</h1>
            <p>Slice fruits for questions. <br><b>DO NOT</b> slice the bombs!</p>
            <button class="btn-action" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div id="question-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--palm-green)">Structure Fragment</h2>
            <p id="question-text" style="font-weight: bold;"></p>
            <div id="options-container"></div>
            <div id="answer-feedback" style="font-weight: bold; margin: 10px; min-height: 20px;"></div>
            <button id="continue-btn" class="btn-action" style="display:none;">CONTINUE</button>
        </div>
    </div>
</div>

<script>
const masterQuestions = [
    { q: "Which word is best to start a paragraph with a NEW idea?", options: ["Furthermore", "However", "In addition", "Overall"], answer: 2 },
    { q: "What is the main goal of the 'Introduction'?", options: ["To give every detail", "To state the thesis and background", "To list the bibliography", "To say goodbye"], answer: 1 },
    { q: "Which transition shows a 'Cause and Effect'?", options: ["For example", "Because of this", "On the other hand", "Firstly"], answer: 1 },
    { q: "In an essay, what does 'To conclude' mean?", options: ["To start the essay", "To give more evidence", "To summarize the main points", "To ask a new question"], answer: 2 },
    { q: "Which phrase is more formal than 'I think'?", options: ["It is often argued that", "In my brain", "I believe", "I'm saying"], answer: 0 }
];

let availableQuestions = [];
let score = 0, lives = 3, gameActive = false;
let objects = [];
let lastTime = 0;
let mousePos = { x: 0, y: 0, prevX: 0, prevY: 0, down: false };

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class GameObject {
    constructor(isBomb = false) {
        this.radius = 45;
        this.x = Math.random() * (canvas.width - 100) + 50;
        this.y = canvas.height + this.radius;
        
        // --- LOWER SPEED PHYSICS ---
        this.gravity = canvas.height * 0.45; // Reduced from 0.85
        let verticalForce = Math.sqrt(2 * (canvas.height * 0.8) * this.gravity); 
        this.vy = -verticalForce; 
        this.vx = (Math.random() - 0.5) * (canvas.width * 0.2);
        
        this.isBomb = isBomb;
        this.label = isBomb ? '💣' : ['🍍', '🥭', '🥥', '🍌', '🍉'][Math.floor(Math.random()*5)];
        this.sliced = false;
    }
    update(dt) {
        this.x += this.vx * dt; this.y += this.vy * dt; this.vy += this.gravity * dt;
        if(this.x < this.radius || this.x > canvas.width - this.radius) this.vx *= -1;
    }
    draw() {
        ctx.font = `${this.radius * 1.5}px Arial`; 
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(this.label, this.x, this.y);
    }
}

function startGame() {
    score = 0; lives = 3;
    availableQuestions = [...masterQuestions];
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    lastTime = performance.now();
    updateUI();
    requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
    if (!gameActive) return;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Spawn Logic: 2.5% chance to spawn; 20% of spawns are bombs
    if (Math.random() < 0.025) {
        let isBomb = Math.random() < 0.2;
        objects.push(new GameObject(isBomb));
    }

    for (let i = objects.length - 1; i >= 0; i--) {
        let obj = objects[i]; obj.update(dt); obj.draw();
        
        if (mousePos.down && !obj.sliced) {
            if (Math.hypot(obj.x - mousePos.x, obj.y - mousePos.y) < obj.radius * 1.5) {
                obj.sliced = true;
                if (obj.isBomb) {
                    triggerBomb();
                    objects.splice(i, 1);
                } else {
                    objects.splice(i, 1);
                    gameActive = false; 
                    triggerQuestion();
                }
            }
        }

        if (obj.y > canvas.height + 100) {
            if (!obj.isBomb) { lives--; updateUI(); } // Missing a fruit costs a life, missing a bomb is fine
            objects.splice(i, 1);
            if (lives <= 0) endGame("Game Over! Watch out for those bombs.");
        }
    }
    drawSlice(); requestAnimationFrame(gameLoop);
}

function triggerBomb() {
    lives--;
    updateUI();
    // Visual feedback for explosion
    const container = document.getElementById('game-container');
    container.classList.add('flash-red');
    setTimeout(() => container.classList.remove('flash-red'), 150);
    
    if (lives <= 0) endGame("BOOM! The bomb ended your journey.");
}

function triggerQuestion() {
    const modal = document.getElementById('question-modal');
    const container = document.getElementById('options-container');
    const feedback = document.getElementById('answer-feedback');
    
    const qIndex = Math.floor(Math.random() * availableQuestions.length);
    const q = availableQuestions[qIndex];

    document.getElementById('question-text').innerText = q.q;
    container.innerHTML = ""; feedback.innerText = "";
    document.getElementById('continue-btn').style.display = "none";
    
    q.options.forEach((opt, idx) => {
        const b = document.createElement('button');
        b.className = 'option-btn'; b.innerText = opt;
        b.onclick = () => {
            if (idx === q.answer) {
                score += 10; updateUI(); feedback.innerText = "Correct! 🌴";
                feedback.style.color = "var(--palm-green)";
                document.getElementById('continue-btn').style.display = "block";
                Array.from(container.children).forEach(btn => btn.disabled = true);
            } else {
                feedback.innerText = "Wrong! -5 Points";
                score = Math.max(0, score - 5); updateUI();
                feedback.style.color = "var(--danger-red)";
            }
        };
        container.appendChild(b);
    });
    modal.style.display = "flex";
}

document.getElementById('continue-btn').onclick = () => {
    document.getElementById('question-modal').style.display = "none";
    gameActive = true; lastTime = performance.now();
    requestAnimationFrame(gameLoop);
};

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('lives').innerText = lives;
}

function endGame(msg) { 
    gameActive = false; 
    alert(msg + "\nFinal Score: " + score); 
    location.reload(); 
}

function handleIn(x, y, down) {
    mousePos.prevX = mousePos.x; mousePos.prevY = mousePos.y;
    mousePos.x = x; mousePos.y = y; mousePos.down = down;
}
canvas.addEventListener('mousedown', (e) => handleIn(e.clientX, e.clientY, true));
canvas.addEventListener('mousemove', (e) => handleIn(e.clientX, e.clientY, mousePos.down));
window.addEventListener('mouseup', () => mousePos.down = false);
canvas.addEventListener('touchstart', (e) => handleIn(e.touches[0].clientX, e.touches[0].clientY, true), {passive:false});
canvas.addEventListener('touchmove', (e) => { handleIn(e.touches[0].clientX, e.touches[0].clientY, true); e.preventDefault(); }, {passive:false});
window.addEventListener('touchend', () => mousePos.down = false);

function drawSlice() {
    if (mousePos.down) {
        ctx.beginPath(); ctx.moveTo(mousePos.prevX, mousePos.prevY);
        ctx.lineTo(mousePos.x, mousePos.y); 
        ctx.strokeStyle = "var(--hibiscus-pink)";
        ctx.lineWidth = 6; ctx.lineCap = "round"; ctx.stroke();
    }
}
</script>
</body>
</html>
